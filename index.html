<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Japanese Study WK</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Japanese Study WK</h1>
    <button id="langToggle">EN / SV</button>
  </header>

  <main>
    <section class="controls">
      <input id="search" placeholder="Sök kanji, meaning, reading..." />
      <select id="levelSelect"></select>
    </section>

    <section id="stats"></section>

    <section id="listView">
      <section id="cards" class="cards"></section>
    </section>

    <section id="detailView" class="hidden">
      <button id="backButton">← Tillbaka</button>
      <article id="kanjiDetail" class="detail-card"></article>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
